<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mis Reservas – Electromóvil SAT</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold:      #C9A227;
    --gold-pale: #FFF8E1;
    --black:     #1A1A1A;
    --white:     #FFFFFF;
    --off-white: #F7F5F0;
    --gray-100:  #F2F2F2;
    --gray-200:  #E5E5E5;
    --gray-400:  #AAAAAA;
    --gray-600:  #666666;
    --success:   #2E7D32;
    --success-bg:#E8F5E9;
    --warning:   #E65100;
    --warning-bg:#FFF3E0;
    --info:      #0277BD;
    --info-bg:   #E1F5FE;
    --whatsapp:  #25D366;
    --radius:    14px;
  }
  *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
  body {
    font-family: 'Barlow', sans-serif;
    background: var(--off-white);
    color: var(--black);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--black);
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,.4);
  }
  header img {
    width: 48px; height: 48px;
    object-fit: contain;
    border-radius: 50%;
  }
  .header-text { flex: 1; }
  .header-text h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 20px;
    color: var(--gold);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .header-text p { font-size: 11px; color: var(--gray-400); letter-spacing: 1px; text-transform: uppercase; }

  /* MAIN */
  main { max-width: 560px; margin: 0 auto; padding: 24px 16px 48px; }

  /* SEARCH BOX */
  .search-card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 28px 24px;
    box-shadow: 0 4px 20px rgba(0,0,0,.08);
    border-top: 4px solid var(--gold);
    margin-bottom: 24px;
    text-align: center;
  }
  .search-card h2 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 22px;
    margin-bottom: 6px;
  }
  .search-card p { font-size: 13px; color: var(--gray-600); margin-bottom: 20px; line-height: 1.5; }

  .phone-input-wrap {
    display: flex;
  }
  .phone-input-wrap input {
    width: 100%;
    background: var(--gray-100);
    border: 1.5px solid var(--gray-200);
    color: var(--black);
    font-family: 'Barlow', sans-serif;
    font-size: 22px;
    font-weight: 600;
    padding: 14px 16px;
    border-radius: 10px;
    outline: none;
    transition: border-color .2s;
    letter-spacing: 2px;
    text-align: center;
  }
  .phone-input-wrap input:focus { border-color: var(--gold); background: var(--white); }
  .btn-buscar {
    background: var(--gold);
    color: var(--black);
    border: none;
    padding: 12px 22px;
    border-radius: 10px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 15px;
    letter-spacing: .5px;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }
  .btn-buscar:hover { background: #E8BF3A; }

  /* CLIENT INFO */
  .client-banner {
    background: var(--black);
    border-radius: var(--radius);
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 18px;
    box-shadow: 0 4px 16px rgba(0,0,0,.15);
  }
  .client-av {
    width: 50px; height: 50px;
    background: var(--gold);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 20px;
    color: var(--black);
    flex-shrink: 0;
  }
  .client-banner h3 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 20px;
    color: var(--white);
  }
  .client-banner p { font-size: 12px; color: var(--gray-400); margin-top: 2px; }

  /* STATS ROW */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  .stat-mini {
    background: var(--white);
    border-radius: 10px;
    padding: 14px 10px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,.06);
  }
  .stat-mini .num {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 28px;
    color: var(--gold);
  }
  .stat-mini .lbl { font-size: 10px; color: var(--gray-400); text-transform: uppercase; letter-spacing: .8px; margin-top: 2px; }

  /* SECTION TITLE */
  .sec-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--gray-400);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sec-title::after { content:''; flex:1; height:1px; background:var(--gray-200); }

  /* RESERVATION CARD */
  .res-card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 18px 20px;
    margin-bottom: 12px;
    box-shadow: 0 2px 10px rgba(0,0,0,.07);
    border-left: 4px solid var(--gray-200);
    transition: border-color .2s;
  }
  .res-card.s-pedido    { border-left-color: var(--info); }
  .res-card.s-esperando { border-left-color: var(--warning); }
  .res-card.s-recibido  { border-left-color: var(--success); }
  .res-card.s-entregado { border-left-color: var(--gray-400); }

  .res-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px; flex-wrap: wrap; gap: 8px;
  }
  .res-id {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900; font-size: 18px; color: var(--gold);
  }
  .res-date { font-size: 12px; color: var(--gray-400); margin-top: 1px; }

  .status-pill {
    padding: 5px 14px; border-radius: 20px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 12px;
    text-transform: uppercase; letter-spacing: .8px;
  }
  .s-pedido-pill    { background: var(--info-bg);    color: var(--info); }
  .s-esperando-pill { background: var(--warning-bg); color: var(--warning); }
  .s-recibido-pill  { background: var(--success-bg); color: var(--success); }
  .s-entregado-pill { background: var(--gray-100);   color: var(--gray-600); }

  /* STATUS TIMELINE */
  .timeline {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 14px 0;
    position: relative;
  }
  .timeline::before {
    content: '';
    position: absolute;
    top: 16px; left: 16px; right: 16px;
    height: 2px;
    background: var(--gray-200);
    z-index: 0;
  }
  .tl-step {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    z-index: 1;
    flex: 1;
  }
  .tl-dot {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--gray-200);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    border: 2px solid var(--gray-200);
    transition: all .3s;
  }
  .tl-dot.done {
    background: var(--gold);
    border-color: var(--gold);
  }
  .tl-dot.active {
    background: var(--white);
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,162,39,.2);
  }
  .tl-lbl {
    font-size: 9px;
    text-align: center;
    color: var(--gray-400);
    text-transform: uppercase;
    letter-spacing: .5px;
    font-weight: 600;
    line-height: 1.2;
  }
  .tl-lbl.done-lbl { color: var(--gold); }
  .tl-lbl.active-lbl { color: var(--black); font-weight: 700; }

  /* ARTICLES mini */
  .art-list { margin-top: 12px; }
  .art-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 7px 0;
    border-bottom: 1px solid var(--gray-100);
    font-size: 13px;
  }
  .art-row:last-child { border-bottom: none; }
  .art-name { font-weight: 500; }
  .art-detail { font-size: 11px; color: var(--gray-400); margin-top: 1px; }
  .art-price { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 14px; }

  .res-total {
    display: flex; justify-content: flex-end; align-items: baseline; gap: 8px;
    padding-top: 10px; margin-top: 4px; border-top: 1px solid var(--gray-200);
  }
  .res-total .lbl { font-size: 11px; color: var(--gray-400); text-transform: uppercase; }
  .res-total .amt { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 22px; }

  /* PAGADO BADGE */
  .pagado-badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 12px; border-radius: 20px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: .5px;
  }
  .pagado-si { background: var(--success-bg); color: var(--success); }
  .pagado-no { background: var(--warning-bg); color: var(--warning); }

  /* ERROR / EMPTY */
  .msg-card {
    background: var(--white); border-radius: var(--radius);
    padding: 40px 24px; text-align: center;
    box-shadow: 0 2px 10px rgba(0,0,0,.06);
  }
  .msg-card .ico { font-size: 48px; margin-bottom: 12px; }
  .msg-card h3 { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 20px; margin-bottom: 6px; }
  .msg-card p { font-size: 13px; color: var(--gray-600); line-height: 1.6; }

  /* LOADING */
  .loading { text-align: center; padding: 48px 20px; color: var(--gray-400); }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--gray-200);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* WA button */
  .btn-wa {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--whatsapp); color: #fff; border: none;
    padding: 10px 20px; border-radius: 10px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 14px; letter-spacing: .5px;
    text-transform: uppercase; text-decoration: none;
    margin-top: 16px; transition: background .2s;
  }
  .btn-wa:hover { background: #1ebc5a; }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 24px 16px;
    font-size: 11px;
    color: var(--gray-400);
    letter-spacing: .5px;
  }
</style>
</head>
<body>

<header>
  <img src="https://electromovilsat-droid.github.io/reservas/logo.png" alt="Logo"
    onerror="this.style.display='none'">
  <div class="header-text">
    <h1>Electromóvil SAT</h1>
    <p>Consulta de Reservas · Salamanca</p>
  </div>
</header>

<main>

  <!-- BÚSQUEDA POR TELÉFONO -->
  <div class="search-card" id="searchCard">
    <h2>Consulta tu reserva</h2>
    <p>Introduce tu número de teléfono móvil para ver el estado de tus reservas en Electromóvil SAT.</p>
    <div class="phone-input-wrap">
      <input type="tel" id="phoneInput" placeholder="612 345 678" maxlength="12"
        onkeydown="if(event.key==='Enter') buscar()">
    </div>
    <button class="btn-buscar" onclick="buscar()" style="width:100%;margin-top:10px;padding:14px;font-size:16px">Ver mis reservas</button>
    <div id="searchError" style="color:#C62828;font-size:13px;margin-top:10px;display:none"></div>
  </div>

  <!-- RESULTADO -->
  <div id="result" style="display:none"></div>

</main>

<footer>
  Electromóvil Salamanca C.B · C/ María Auxiliadora Nº 59 · 37004 Salamanca<br>
  Tel. 923 065 283 / 658 884 201
</footer>

<script>
const FIREBASE_URL = 'https://electromovilsat-reservas-default-rtdb.europe-west1.firebasedatabase.app';

const SL = {
  pedido:    'Pedido realizado',
  esperando: 'Esperando pedido',
  recibido:  'Pedido recibido',
  entregado: 'Entregado al cliente'
};
const SI = { pedido:'📋', esperando:'⏳', recibido:'📦', entregado:'✅' };
const STEPS = ['pedido','esperando','recibido','entregado'];

// Auto-buscar si viene ?tel= en la URL
window.onload = () => {
  const params = new URLSearchParams(window.location.search);
  const tel = params.get('tel');
  if (tel) {
    document.getElementById('phoneInput').value = tel;
    buscar();
  }
};

async function buscar() {
  const raw   = document.getElementById('phoneInput').value.trim().replace(/\s/g,'');
  const errEl = document.getElementById('searchError');
  errEl.style.display = 'none';

  if (raw.length < 9) {
    errEl.textContent = '⚠ Introduce un número de teléfono válido (9 dígitos).';
    errEl.style.display = 'block';
    return;
  }

  document.getElementById('result').style.display = 'block';
  document.getElementById('result').innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      <p>Buscando tus reservas…</p>
    </div>`;

  try {
    const r = await fetch(`${FIREBASE_URL}/em_data/clients/${raw}.json`);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const client = await r.json();

    if (!client) {
      document.getElementById('result').innerHTML = `
        <div class="msg-card">
          <div class="ico">🔍</div>
          <h3>No encontrado</h3>
          <p>No hay reservas registradas con el teléfono <strong>${raw}</strong>.<br>
          Comprueba el número o consulta en tienda.</p>
        </div>`;
      return;
    }
    renderClient(client);
  } catch(e) {
    document.getElementById('result').innerHTML = `
      <div class="msg-card">
        <div class="ico">⚠️</div>
        <h3>Error de conexión</h3>
        <p>No se pudo conectar. Comprueba tu conexión a internet e inténtalo de nuevo.</p>
      </div>`;
  }
}

function renderClient(c) {
  const reservations = c.reservations || [];
  const pending  = reservations.filter(r => r.status !== 'entregado');
  const finished = reservations.filter(r => r.status === 'entregado');
  const totalSpent = reservations.reduce((s,r) => s+(r.total||0), 0);
  const ini = c.name.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();

  const resCards = reservations.slice().reverse().map(r => resCard(r)).join('');

  document.getElementById('result').innerHTML = `
    <div class="client-banner">
      <div class="client-av">${ini}</div>
      <div>
        <h3>${c.name}</h3>
        <p>📞 ${c.phone}</p>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-mini">
        <div class="num">${reservations.length}</div>
        <div class="lbl">Reservas</div>
      </div>
      <div class="stat-mini">
        <div class="num">${pending.length}</div>
        <div class="lbl">Pendientes</div>
      </div>
      <div class="stat-mini">
        <div class="num">${totalSpent.toFixed(0)} €</div>
        <div class="lbl">Total</div>
      </div>
    </div>

    ${pending.length ? `<div class="sec-title">Reservas activas</div>${pending.slice().reverse().map(r=>resCard(r)).join('')}` : ''}
    ${finished.length ? `<div class="sec-title" style="margin-top:20px">Finalizadas</div>${finished.slice().reverse().map(r=>resCard(r)).join('')}` : ''}

    <div style="text-align:center;margin-top:24px">
      <a class="btn-wa" href="https://wa.me/34658884201" target="_blank">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a7.9 7.9 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.117.551 4.103 1.513 5.832L0 24l6.335-1.493A11.95 11.95 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22a9.95 9.95 0 0 1-5.149-1.363l-.368-.215-3.762.887.92-3.664-.24-.381A9.953 9.953 0 0 1 2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
        Contactar con la tienda
      </a>
    </div>`;
}

function resCard(r) {
  const stepIdx = STEPS.indexOf(r.status);
  const artRows = (r.articles||[]).map(a => `
    <div class="art-row">
      <div>
        <div class="art-name">${a.article||'-'}${a.model?' · '+a.model:''}${a.color?' · '+a.color:''}</div>
        <div class="art-detail">Cantidad: ${a.qty}</div>
      </div>
      <div class="art-price">${(a.qty*a.price).toFixed(2)} €</div>
    </div>`).join('');

  const timeline = STEPS.map((s, i) => {
    const isDone   = i < stepIdx;
    const isActive = i === stepIdx;
    return `
      <div class="tl-step">
        <div class="tl-dot ${isDone?'done':''} ${isActive?'active':''}">${isDone?'✓':SI[s]}</div>
        <div class="tl-lbl ${isDone?'done-lbl':''} ${isActive?'active-lbl':''}">${SL[s].replace(' ','\n')}</div>
      </div>`;
  }).join('');

  const pagadoBadge = r.pagado === 'pagado'
    ? `<span class="pagado-badge pagado-si">✅ Pagado</span>`
    : `<span class="pagado-badge pagado-no">⏳ Pendiente de pago</span>`;

  return `
    <div class="res-card s-${r.status}">
      <div class="res-head">
        <div>
          <div class="res-id">${r.id}</div>
          <div class="res-date">📅 ${r.date}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
          <span class="status-pill s-${r.status}-pill">${SL[r.status]||r.status}</span>
          ${pagadoBadge}
        </div>
      </div>

      <!-- TIMELINE -->
      <div class="timeline">${timeline}</div>

      <!-- ARTÍCULOS -->
      <div class="art-list">${artRows}</div>

      <div class="res-total">
        <span class="lbl">Total IVA inc.</span>
        <span class="amt">${r.total.toFixed(2).replace('.',',')} €</span>
      </div>
    </div>`;
}
</script>
</body>
</html>
